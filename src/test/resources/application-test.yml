# 测试配置
server:
  port: 0  # 随机端口

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.topology.phytopo.entity
  configuration:
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    root: INFO
    com.topology.phytopo: DEBUG

# 拓扑服务配置
topology:
  merge:
    enabled: false
    threshold: 20
    mode: THRESHOLD
  sync:
    batch-size: 100
    retry-times: 3
    retry-interval: 1000
  init:
    enabled: false
    async: true
